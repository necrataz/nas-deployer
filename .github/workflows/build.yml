name: Build Windows EXE

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Verify syntax (py_compile)
        run: |
          python -m py_compile src/app.py
          python -m py_compile src/ssh_client.py
          python -m py_compile src/apps.py
          python -m py_compile src/compose_data.py

      - name: Validate compose + apps metadata
        run: python tests/validate_compose.py

      - name: Build EXE
        # v1.2 fix: --collect-data ttkbootstrap 把 assets/icons/bootstrap.ttf 等图标字体/PNG 打进 EXE
        # 不加会报 FileNotFoundError: ...\ttkbootstrap\assets\icons\bootstrap.ttf
        run: pyinstaller --onefile --windowed --name NASDeployer --collect-data ttkbootstrap --add-data "src/compose_data.py;." src/app.py

      - name: List build output
        run: dir dist

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: NASDeployer-Windows-EXE
          path: dist/NASDeployer.exe

      - name: Attach to release (on tag)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/NASDeployer.exe